name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang ldid git curl
          git clone --recursive https://github.com/theos/theos.git /home/runner/theos
          mkdir -p /home/runner/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xf master.tar.gz -C /home/runner/theos/sdks --strip-components=1

      - name: Build
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package
          
      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoustacheMod-Package
          path: packages/*.deb
