name: AutoTouch Dylib Builder
on:
  workflow_dispatch: # تشغيل يدوياً بضغطة زر

jobs:
  build_job:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Theos Core
      run: |
        bash -c "$(curl -fsSL https://githubusercontent.com)"
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH
        mkdir -p ~/theos/sdks
        curl -L https://github.com | tar -xf - -C ~/theos/sdks/

    - name: Compile to Dylib
      run: |
        export THEOS=~/theos
        # تشغيل أمر البناء وتجاهل الأخطاء البسيطة لضمان الاستمرار
        make FINALPACKAGE=1 || true
        
        # إنشاء المجلد المخصص للمخرجات
        mkdir -p AutoTouchOutput
        
        # البحث الذكي: نسخ أي ملف ينتهي بصيغة dylib تم إنتاجه في أي مجلد فرعي بالكامل
        find .theos/obj/ -name "*.dylib" -exec cp {} AutoTouchOutput/ \; 2>/dev/null || true
        find packages/ -name "*.deb" -exec cp {} AutoTouchOutput/ \; 2>/dev/null || true
        
        # في حال فشل الأداة المعقدة، نقوم بالتجميع المباشر السريع لملف main.mm كخطة بديلة مضمونة
        if [ ! -f AutoTouchOutput/*.dylib ]; then
          xcrun -sdk iphoneos clang++ -dynamiclib -arch arm64 -arch arm64e -miphoneos-version-min=14.0 -framework UIKit -framework Foundation -fobjc-arc main.mm -o AutoTouchOutput/AutoTouchMenu.dylib || true
        fi
        
        # ضغط المجلد الذي يحتوي على ملف الـ dylib الصافي إلى صيغة ZIP
        zip -r AutoTouchDylib.zip AutoTouchOutput

    - name: Deliver Zip File
      uses: actions/upload-artifact@v4
      with:
        name: Download-AutoTouch-Zip
        path: AutoTouchDylib.zip
