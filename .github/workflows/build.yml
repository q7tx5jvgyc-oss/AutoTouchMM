name: Build iOS Dylib

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً أيضاً

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Compile Dylib
      run: |
        clang++ -dynamiclib -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
        -arch arm64 -miphoneos-version-min=14.0 \
        -framework UIKit -framework Foundation -framework CoreGraphics \
        main.mm -o AutoTouchMenu.dylib

    - name: Upload Dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoTouch-Compiled-Dylib
        path: AutoTouchMenu.dylib
